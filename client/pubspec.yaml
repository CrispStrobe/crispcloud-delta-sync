name: crispcloud_delta_sync_cli
description: >
  Minimal CLI demo client for the CrispCloud Delta Sync Nextcloud/ownCloud
  server app.  Computes local block maps, fetches remote block maps, diffs,
  and uploads only changed blocks.
version: 0.1.0

environment:
  sdk: ^3.0.0

dependencies:
  args: ^2.4.0
  crypto: ^3.0.3
  http: ^1.2.0
  path: ^1.9.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
